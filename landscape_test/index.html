<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>横屏眼动测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #fff;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }
        /* 强制横屏提示 */
        #rotate-msg {
            display: none;
            position: fixed; inset: 0;
            background: #111;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        @media (orientation: portrait) {
            #rotate-msg { display: flex !important; }
            #app { display: none !important; }
        }

        #app {
            width: 100vw; height: 100vh;
            position: relative;
        }
        video { display: none; }

        /* 注视点 - 无 transition，即时响应 */
        #gaze-dot {
            position: absolute;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: rgba(0, 255, 100, 0.8);
            box-shadow: 0 0 12px rgba(0, 255, 100, 0.6);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            left: 50%; top: 50%;
        }

        /* 校准点 */
        .calib-dot {
            position: absolute;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: #ffcc00;
            transform: translate(-50%, -50%);
            animation: pulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(0.6); }
            to { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* 试次画面 */
        #trial-container {
            display: none;
            width: 100%; height: 100%;
            position: relative;
        }
        .option-img {
            position: absolute;
            top: 10%;
            height: 80%;
            object-fit: contain;
            border: 3px solid #333;
            border-radius: 12px;
        }
        #img-left { left: 5%; width: 40%; }
        #img-right { right: 5%; width: 40%; }

        #fixation-cross {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ffcc00;
            display: none;
        }

        /* 信息 */
        #info {
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #888;
            z-index: 200;
        }
        #status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            text-align: center;
            z-index: 50;
        }

        /* 选择按钮 */
        .choice-btn {
            position: absolute;
            bottom: 5%;
            width: 35%;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            z-index: 50;
        }
        #btn-left { left: 7.5%; background: #2a6bff; }
        #btn-right { right: 7.5%; background: #ff4444; }
    </style>
</head>
<body>
    <!-- 竖屏提示 -->
    <div id="rotate-msg">
        📱 请将手机横过来<br>
        <span style="font-size:60px; margin-top:20px;">↻</span>
    </div>

    <div id="app">
        <video id="input_video" playsinline></video>
        <div id="gaze-dot"></div>
        <div id="info"></div>
        <div id="status">加载中...</div>
        <div id="fixation-cross">+</div>

        <div id="trial-container">
            <img id="img-left" class="option-img" src="" />
            <img id="img-right" class="option-img" src="" />
            <button id="btn-left" class="choice-btn">⬅ 选左边</button>
            <button id="btn-right" class="choice-btn">➡ 选右边</button>
        </div>
    </div>

    <!-- MediaPipe (与正式实验版本一致) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script>
    // ============================================================
    // 配置
    // ============================================================
    const NUM_TRIALS = 3;
    const FIXATION_MS = 800;
    const IMAGE_DIR = '../food2/images/';
    // 使用 food2 的图片，随机选6张（3试次×2张）
    const ALL_IMAGES = [];
    for (let i = 1; i <= 200; i++) ALL_IMAGES.push(`${i}.jpg`);

    // ============================================================
    // 状态
    // ============================================================
    const videoElement = document.getElementById('input_video');
    const gazeDot = document.getElementById('gaze-dot');
    const infoDiv = document.getElementById('info');
    const statusDiv = document.getElementById('status');
    const trialContainer = document.getElementById('trial-container');
    const fixCross = document.getElementById('fixation-cross');

    let faceMesh, camera;
    let calibrated = false;
    // 默认值匹配典型 raw_x/raw_y 范围
    let calibLimits = { x_min: 0.25, x_max: 0.75, x_center: 0.5, y_min: -0.2, y_max: 0.8, y_center: 0.3 };
    let rawXBuffer = [], rawYBuffer = [];
    const RAW_BUFFER_SIZE = 10;
    const GAZE_SMOOTH_SIZE = 5;
    let lastGaze = { x: 0, y: 0, raw_x: 0.5, raw_y: 0.5, valid: false };
    let gazeLog = [];

    let currentTrial = 0;
    let trials = [];
    let trialStartTime = 0;
    let state = 'LOADING'; // LOADING, CALIBRATING, FIXATION, DECISION, DONE

    // ============================================================
    // MediaPipe onResults (复刻 food3_formal 逻辑)
    // ============================================================
    function onResults(results) {
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
            lastGaze.valid = false;
            return;
        }
        const lms = results.multiFaceLandmarks[0];

        // 有效性检测 (眼睛是否睁开)
        const v_dist = Math.hypot(lms[159].x - lms[145].x, lms[159].y - lms[145].y);
        const h_dist = Math.hypot(lms[133].x - lms[33].x, lms[133].y - lms[33].y);
        const ratio = v_dist / (h_dist + 1e-6);
        lastGaze.valid = ratio > 0.14;

        // gazeX: 虹膜在眼眶中的水平比值
        const h_dist_lx = Math.hypot(lms[133].x - lms[33].x, lms[133].y - lms[33].y);
        const lx = Math.hypot(lms[468].x - lms[33].x, lms[468].y - lms[33].y) / (h_dist_lx + 1e-6);
        const h_dist_rx = Math.hypot(lms[263].x - lms[362].x, lms[263].y - lms[362].y);
        const rx = Math.hypot(lms[473].x - lms[362].x, lms[473].y - lms[362].y) / (h_dist_rx + 1e-6);
        const raw_x = (lx + rx) / 2.0;

        // gazeY: 虹膜在眼睑中的垂直比值
        const leftEyeH = Math.hypot(lms[159].x - lms[145].x, lms[159].y - lms[145].y);
        const rightEyeH = Math.hypot(lms[386].x - lms[374].x, lms[386].y - lms[374].y);
        const l_y_ratio = (lms[468].y - lms[159].y) / (leftEyeH + 1e-6);
        const r_y_ratio = (lms[473].y - lms[386].y) / (rightEyeH + 1e-6);
        const raw_y = (l_y_ratio + r_y_ratio) / 2.0;

        lastGaze.raw_x = raw_x;
        lastGaze.raw_y = raw_y;

        // 缓存
        rawXBuffer.push(raw_x);
        if (rawXBuffer.length > RAW_BUFFER_SIZE) rawXBuffer.shift();
        rawYBuffer.push(raw_y);
        if (rawYBuffer.length > RAW_BUFFER_SIZE) rawYBuffer.shift();

        // 平滑 (只用最近3帧，减少延迟)
        const sX = rawXBuffer.slice(-3);
        const sY = rawYBuffer.slice(-3);
        const avgX = sX.reduce((a, b) => a + b, 0) / sX.length;
        const avgY = sY.reduce((a, b) => a + b, 0) / sY.length;

        // 映射到屏幕坐标
        lastGaze.x = mapX(avgX);
        lastGaze.y = mapY(avgY);

        // 更新注视点位置 (始终更新，即使未校准)
        const normX = Math.max(0, Math.min(1, lastGaze.x / window.innerWidth));
        const normY = Math.max(0, Math.min(1, lastGaze.y / window.innerHeight));
        gazeDot.style.left = (normX * 100) + '%';
        gazeDot.style.top = (normY * 100) + '%';
        gazeDot.style.opacity = lastGaze.valid ? '1' : '0.3';
        gazeDot.style.background = lastGaze.valid ? 
            (calibrated ? 'rgba(0,255,100,0.8)' : 'rgba(255,200,0,0.8)') : 'rgba(255,0,0,0.5)';

        infoDiv.textContent = `raw_x=${raw_x.toFixed(3)} raw_y=${raw_y.toFixed(3)} | screen: ${normX.toFixed(2)}, ${normY.toFixed(2)} | ${calibrated ? '已校准' : '未校准'}`;

        // 记录 (仅决策阶段)
        if (state === 'DECISION' && lastGaze.valid) {
            gazeLog.push({
                trial: currentTrial + 1,
                time: Date.now() - trialStartTime,
                gazeX: normX.toFixed(4),
                gazeY: normY.toFixed(4),
                raw_x: raw_x.toFixed(5),
                raw_y: raw_y.toFixed(5),
                valid: 1
            });
        }
    }

    function mapX(rx) {
        const { x_min, x_max, x_center } = calibLimits;
        if (rx < x_center) {
            let norm = (rx - x_min) / (x_center - x_min + 1e-6);
            return Math.max(0, norm) * (window.innerWidth / 2);
        } else {
            let norm = (rx - x_center) / (x_max - x_center + 1e-6);
            return (window.innerWidth / 2) + Math.min(1, norm) * (window.innerWidth / 2);
        }
    }

    function mapY(ry) {
        const { y_min, y_max, y_center } = calibLimits;
        if (!y_center) return ry * window.innerHeight;
        if (ry < y_center) {
            let norm = (ry - y_min) / (y_center - y_min + 1e-6);
            return Math.max(0, norm) * (window.innerHeight / 2);
        } else {
            let norm = (ry - y_center) / (y_max - y_center + 1e-6);
            return (window.innerHeight / 2) + Math.min(1, norm) * (window.innerHeight / 2);
        }
    }

    function median(arr) {
        const s = [...arr].sort((a, b) => a - b);
        const m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
    }

    // ============================================================
    // 校准 (5点: 中、左、右、上、下)
    // ============================================================
    async function runCalibration() {
        state = 'CALIBRATING';
        statusDiv.style.display = 'none';
        trialContainer.style.display = 'none';

        const positions = [
            { x: 50, y: 50, label: '中' },
            { x: 15, y: 50, label: '左' },
            { x: 85, y: 50, label: '右' },
            { x: 50, y: 20, label: '上' },
            { x: 50, y: 80, label: '下' }
        ];

        const resX = [], resY = [];

        for (let i = 0; i < positions.length; i++) {
            const pos = positions[i];
            // 显示校准点
            const dot = document.createElement('div');
            dot.className = 'calib-dot';
            dot.style.left = pos.x + '%';
            dot.style.top = pos.y + '%';
            document.getElementById('app').appendChild(dot);

            // 等待注视稳定
            await sleep(1500);

            // 采集
            rawXBuffer = [];
            rawYBuffer = [];
            await sleep(800);

            const cx = rawXBuffer.length >= 3 ? median(rawXBuffer) : lastGaze.raw_x;
            const cy = rawYBuffer.length >= 3 ? median(rawYBuffer) : lastGaze.raw_y;
            resX.push(cx);
            resY.push(cy);

            dot.remove();
            await sleep(300);
        }

        // 设置校准参数 (中、左、右、上、下)
        calibLimits.x_center = resX[0];
        calibLimits.x_min = Math.min(...resX) - (resX[0] - Math.min(...resX)) * 0.4;
        calibLimits.x_max = Math.max(...resX) + (Math.max(...resX) - resX[0]) * 0.4;
        calibLimits.y_center = resY[0];
        calibLimits.y_min = Math.min(...resY) - (resY[0] - Math.min(...resY)) * 0.4;
        calibLimits.y_max = Math.max(...resY) + (Math.max(...resY) - resY[0]) * 0.4;

        calibrated = true;
        console.log('校准完成:', calibLimits);
        startTrials();
    }

    // ============================================================
    // 试次逻辑
    // ============================================================
    function generateTrials() {
        const shuffled = ALL_IMAGES.sort(() => Math.random() - 0.5);
        trials = [];
        for (let i = 0; i < NUM_TRIALS; i++) {
            trials.push({
                left_img: shuffled[i * 2],
                right_img: shuffled[i * 2 + 1],
                left_val: Math.floor(Math.random() * 10) + 1,
                right_val: Math.floor(Math.random() * 10) + 1
            });
        }
    }

    async function startTrials() {
        generateTrials();
        for (currentTrial = 0; currentTrial < NUM_TRIALS; currentTrial++) {
            await runOneTrial(trials[currentTrial]);
        }
        showResults();
    }

    async function runOneTrial(trial) {
        // --- 注视十字 ---
        state = 'FIXATION';
        trialContainer.style.display = 'none';
        fixCross.style.display = 'block';
        statusDiv.style.display = 'none';
        await sleep(FIXATION_MS);
        fixCross.style.display = 'none';

        // --- 决策画面 ---
        state = 'DECISION';
        document.getElementById('img-left').src = IMAGE_DIR + trial.left_img;
        document.getElementById('img-right').src = IMAGE_DIR + trial.right_img;
        trialContainer.style.display = 'block';
        trialStartTime = Date.now();

        // 等待选择
        const choice = await waitForChoice();
        trial.choice = choice;
        trial.rt = Date.now() - trialStartTime;

        trialContainer.style.display = 'none';
        console.log(`Trial ${currentTrial + 1}: chose ${choice}, RT=${trial.rt}ms`);
    }

    function waitForChoice() {
        return new Promise(resolve => {
            const btnL = document.getElementById('btn-left');
            const btnR = document.getElementById('btn-right');
            function onLeft() {
                btnL.removeEventListener('click', onLeft);
                btnR.removeEventListener('click', onRight);
                resolve('left');
            }
            function onRight() {
                btnL.removeEventListener('click', onLeft);
                btnR.removeEventListener('click', onRight);
                resolve('right');
            }
            btnL.addEventListener('click', onLeft);
            btnR.addEventListener('click', onRight);
        });
    }

    // ============================================================
    // 结果展示
    // ============================================================
    function showResults() {
        state = 'DONE';
        gazeDot.style.display = 'none';
        trialContainer.style.display = 'none';

        let html = '<h2>测试完成！</h2>';
        html += `<p>共 ${gazeLog.length} 帧 gaze 数据</p>`;
        html += '<table style="margin:20px auto; border-collapse:collapse; font-size:14px;">';
        html += '<tr><th style="padding:5px 10px; border:1px solid #555;">Trial</th>' +
                '<th style="padding:5px 10px; border:1px solid #555;">选择</th>' +
                '<th style="padding:5px 10px; border:1px solid #555;">RT</th>' +
                '<th style="padding:5px 10px; border:1px solid #555;">左看%</th>' +
                '<th style="padding:5px 10px; border:1px solid #555;">右看%</th></tr>';

        for (let t = 0; t < NUM_TRIALS; t++) {
            const tGaze = gazeLog.filter(g => g.trial === t + 1);
            const leftLook = tGaze.filter(g => parseFloat(g.gazeX) < 0.5).length;
            const rightLook = tGaze.length - leftLook;
            const leftPct = tGaze.length > 0 ? (leftLook / tGaze.length * 100).toFixed(1) : '-';
            const rightPct = tGaze.length > 0 ? (rightLook / tGaze.length * 100).toFixed(1) : '-';

            html += `<tr>
                <td style="padding:5px 10px; border:1px solid #555;">${t + 1}</td>
                <td style="padding:5px 10px; border:1px solid #555;">${trials[t].choice}</td>
                <td style="padding:5px 10px; border:1px solid #555;">${trials[t].rt}ms</td>
                <td style="padding:5px 10px; border:1px solid #555;">${leftPct}%</td>
                <td style="padding:5px 10px; border:1px solid #555;">${rightPct}%</td>
            </tr>`;
        }
        html += '</table>';

        // 下载按钮
        html += '<button onclick="downloadData()" style="margin:20px; padding:10px 30px; font-size:16px; border-radius:8px; border:none; background:#2a6bff; color:#fff;">下载数据</button>';

        statusDiv.innerHTML = html;
        statusDiv.style.display = 'block';
    }

    function downloadData() {
        const csv = 'trial,time_ms,gazeX,gazeY,raw_x,raw_y,valid\n' +
            gazeLog.map(g => `${g.trial},${g.time},${g.gazeX},${g.gazeY},${g.raw_x},${g.raw_y},${g.valid}`).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `landscape_test_gaze_${Date.now()}.csv`;
        a.click();
    }

    let frameCount = 0;
    const debugDiv = document.createElement('div');
    debugDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;color:lime;font-size:12px;z-index:9999;background:rgba(0,0,0,0.7);padding:5px 10px;border-radius:5px;';
    document.body.appendChild(debugDiv);

    // ============================================================
    // 初始化
    // ============================================================
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function init() {
        statusDiv.textContent = '① 加载 MediaPipe...';
        debugDiv.textContent = '状态: 初始化中...';

        try {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            statusDiv.textContent = '② FaceMesh 创建成功，配置中...';

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                frameCount++;
                try {
                    onResults(results);
                } catch(e) {
                    debugDiv.textContent = '❌ onResults错误: ' + e.message;
                }
                if (frameCount % 10 === 0) {
                    debugDiv.textContent = `帧: ${frameCount} | raw_x: ${lastGaze.raw_x.toFixed(3)} | valid: ${lastGaze.valid} | dot: ${gazeDot.style.left}`;
                }
            });

            statusDiv.textContent = '③ 启动摄像头...';

            camera = new Camera(videoElement, {
                onFrame: async () => {
                    try {
                        await faceMesh.send({ image: videoElement });
                    } catch(e) {
                        debugDiv.textContent = '❌ send错误: ' + e.message;
                    }
                },
                width: 640,
                height: 480
            });
            await camera.start();

            statusDiv.innerHTML = '✅ 摄像头就绪<br><br>请将手机放在支架上，保持正面<br><br>' +
                '<button onclick="runCalibration()" style="padding:12px 40px; font-size:18px; border-radius:10px; border:none; background:#ffcc00; color:#111; cursor:pointer;">开始校准</button>';
            debugDiv.textContent = '状态: 等待校准... 帧数将在检测到人脸后增加';

        } catch(e) {
            statusDiv.textContent = '❌ 初始化失败: ' + e.message;
            debugDiv.textContent = '错误: ' + e.message;
            console.error(e);
        }
    }

    init();
    </script>
</body>
</html>
