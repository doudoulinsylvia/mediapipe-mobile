<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>横屏注视点测试</title>
  <!-- MediaPipe Solutions (与 food3_formal 完全一致) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:sans-serif; overflow:hidden; width:100vw; height:100vh; }
    #rotate-msg { display:none; position:fixed; inset:0; background:#000; z-index:9999;
      flex-direction:column; align-items:center; justify-content:center; font-size:24px; }
    @media (orientation: portrait) {
      #rotate-msg { display:flex !important; }
      canvas { display:none !important; }
    }
    canvas { display:block; width:100vw; height:100vh; }
    .video-container { position:absolute; top:-9999px; left:-9999px; }
    #debug { position:fixed; bottom:5px; left:5px; color:lime; font-size:11px; z-index:9999;
      background:rgba(0,0,0,0.7); padding:4px 8px; border-radius:4px; }
  </style>
</head>
<body>
  <div id="rotate-msg">📱 请将手机横过来<br><span style="font-size:60px;margin-top:20px;">↻</span></div>
  <div class="video-container"><video id="input_video" playsinline webkit-playsinline></video></div>
  <canvas id="c"></canvas>
  <div id="debug">加载中...</div>

<script>
// ============================================================
// 完全复刻 food3_formal 的 MediaPipe 初始化方式
// 只做一件事: 在 canvas 上画注视点
// ============================================================
const videoElement = document.getElementById('input_video');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const debugDiv = document.getElementById('debug');

let lastGaze = { raw_x: 0.5, raw_y: 0.5, valid: false };
let rawXBuffer = [], rawYBuffer = [];
let calibLimits = { x_min: 0.3, x_max: 0.7, x_center: 0.5, y_min: -0.1, y_max: 0.7, y_center: 0.3 };
let calibrated = false;
let frameCount = 0;
let displayGX = 0, displayGY = 0; // EMA 显示位置
const EMA_ALPHA = 0.5; // 加快响应 (0=慢, 1=即时)

// 实验参数
const NUM_TRIALS = 150;
const RATING_COUNT = 200;
const IMG_DIR = '../food2/images/';
const foodImages = {};

// 随机打乱 200 张图片，全部预加载
const allIds = Array.from({length:200}, (_,i) => i+1);
for (let i = allIds.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [allIds[i],allIds[j]]=[allIds[j],allIds[i]]; }
const imgList = allIds.map(id => `${id}.jpg`);
let imagesLoaded = 0;

function preloadImages() {
    imgList.forEach(name => {
        const img = new Image();
        img.onload = () => { imagesLoaded++; };
        img.src = IMG_DIR + name;
        foodImages[name] = img;
    });
}
preloadImages();

// 评分阶段
let ratingImages = [...imgList]; // 200 张图片
let currentRatingIndex = 0;
let ratingLog = [];
let ratingStartTime = 0;

// 二元选择阶段
let trials = [];
let currentTrial = -1;
let trialStartTime = 0;
let gazeLog = [];

// 状态控制
let phase = 'LOADING';
let breakResolve = null;
let calibCurrentPoint = null;

// ============================================================
// onResults (完全复刻 food3_formal)
// ============================================================
function onResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        lastGaze.valid = false;
        return;
    }
    frameCount++;
    const lms = results.multiFaceLandmarks[0];

    const v_dist = Math.hypot(lms[159].x - lms[145].x, lms[159].y - lms[145].y);
    const h_dist = Math.hypot(lms[133].x - lms[33].x, lms[133].y - lms[33].y);
    const ratio = v_dist / (h_dist + 1e-6);
    lastGaze.valid = ratio > 0.14;

    const h_dist_lx = Math.hypot(lms[133].x - lms[33].x, lms[133].y - lms[33].y);
    const lx = Math.hypot(lms[468].x - lms[33].x, lms[468].y - lms[33].y) / (h_dist_lx + 1e-6);
    const h_dist_rx = Math.hypot(lms[263].x - lms[362].x, lms[263].y - lms[362].y);
    const rx = Math.hypot(lms[473].x - lms[362].x, lms[473].y - lms[362].y) / (h_dist_rx + 1e-6);
    // 横屏前摄镜像修正: 翻转 X
    const raw_x = 1.0 - (lx + rx) / 2.0;

    const leftEyeH = Math.hypot(lms[159].x - lms[145].x, lms[159].y - lms[145].y);
    const rightEyeH = Math.hypot(lms[386].x - lms[374].x, lms[386].y - lms[374].y);
    const l_y = (lms[468].y - lms[159].y) / (leftEyeH + 1e-6);
    const r_y = (lms[473].y - lms[386].y) / (rightEyeH + 1e-6);
    const raw_y = (l_y + r_y) / 2.0;

    lastGaze.raw_x = raw_x;
    lastGaze.raw_y = raw_y;

    // 只在眼睛睁开时加入 buffer，过滤眨眼噪声
    if (lastGaze.valid) {
        rawXBuffer.push(raw_x);
        if (rawXBuffer.length > 12) rawXBuffer.shift();
        rawYBuffer.push(raw_y);
        if (rawYBuffer.length > 12) rawYBuffer.shift();
    }

    debugDiv.textContent = `f:${frameCount} rx:${raw_x.toFixed(3)} ry:${raw_y.toFixed(3)} v:${lastGaze.valid?'Y':'N'}`;
}

function median(arr) {
    const s = [...arr].sort((a,b) => a-b);
    const m = Math.floor(s.length/2);
    return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}

function mapX(rx) {
    const { x_min, x_max, x_center } = calibLimits;
    let px;
    if (rx < x_center) {
        px = Math.max(0, (rx-x_min)/(x_center-x_min+1e-6)) * (canvas.width/2);
    } else {
        px = canvas.width/2 + Math.min(1, (rx-x_center)/(x_max-x_center+1e-6)) * (canvas.width/2);
    }
    return Math.max(0, Math.min(canvas.width, px));
}

function mapY(ry) {
    const { y_min, y_max, y_center } = calibLimits;
    let py;
    if (ry < y_center) {
        py = Math.max(0, (ry-y_min)/(y_center-y_min+1e-6)) * (canvas.height/2);
    } else {
        py = canvas.height/2 + Math.min(1, (ry-y_center)/(y_max-y_center+1e-6)) * (canvas.height/2);
    }
    return Math.max(0, Math.min(canvas.height, py));
}

// ============================================================
// 画面渲染
// ============================================================
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (phase === 'LOADING') {
        drawText('加载中...', canvas.width/2, canvas.height/2, 24);
    } else if (phase === 'READY') {
        drawText('✅ 摄像头就绪', canvas.width/2, canvas.height/2 - 40, 24);
        drawText('点击屏幕开始校准', canvas.width/2, canvas.height/2 + 20, 18, '#aaa');
    } else if (phase === 'CALIBRATING' && calibCurrentPoint) {
        // 画校准黄点
        ctx.beginPath();
        ctx.arc(calibCurrentPoint.x * canvas.width, calibCurrentPoint.y * canvas.height, 18, 0, Math.PI*2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(calibCurrentPoint.x * canvas.width, calibCurrentPoint.y * canvas.height, 5, 0, Math.PI*2);
        ctx.fillStyle = '#111';
        ctx.fill();
        drawText(`请注视黄点 (${calibCurrentPoint.index}/${calibCurrentPoint.total})`, canvas.width/2, canvas.height - 40, 16, '#888');
    } else if (phase === 'BREAK') {
        drawText('☕ 休息一下', canvas.width/2, canvas.height/2 - 50, 28);
        drawText(`已完成 ${currentTrial}/${NUM_TRIALS} 试次`, canvas.width/2, canvas.height/2, 18, '#aaa');
        drawText('点击屏幕继续（将重新校准）', canvas.width/2, canvas.height/2 + 50, 18, '#ffcc00');
    } else if (phase === 'RATING_FIXATION') {
        drawText('+', canvas.width/2, canvas.height/2, 60, '#ffcc00');
        drawText(`评分阶段 ${currentRatingIndex+1}/${RATING_COUNT}`, canvas.width/2, 25, 14, '#666');
    } else if (phase === 'RATING_DECISION') {
        // 横屏评分: 图片居中偏左, 按钮在右侧
        const id = ratingImages[currentRatingIndex];
        const imgSize = canvas.height * 0.65;
        const imgX = canvas.width * 0.05;
        const imgY = (canvas.height - imgSize) / 2;
        const img = foodImages[id];
        if (img && img.complete) {
            ctx.drawImage(img, imgX, imgY, imgSize, imgSize);
        } else {
            ctx.fillStyle = '#333'; ctx.fillRect(imgX, imgY, imgSize, imgSize);
        }
        drawText(`评分 ${currentRatingIndex+1}/${RATING_COUNT}`, canvas.width/2, 25, 14, '#666');
        drawText('请打分 (1=不喜欢, 10=极其喜欢)', canvas.width * 0.65, imgY - 5, 13, '#aaa');
        // 画 10 个按钮 (2行×5列, 在右侧)
        const btns = getRatingBtnCoords();
        for (let btn of btns) {
            ctx.fillStyle = '#333';
            ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
            ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
            ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
            drawText(btn.val.toString(), btn.x + btn.w/2, btn.y + btn.h/2, 18, '#fff');
        }
    } else if (phase === 'PHASE1_END') {
        drawText('✅ 评分阶段完成！', canvas.width/2, canvas.height/2 - 40, 26);
        drawText('接下来进入二元选择阶段', canvas.width/2, canvas.height/2 + 10, 18, '#aaa');
        drawText('点击屏幕继续（将重新校准）', canvas.width/2, canvas.height/2 + 60, 18, '#ffcc00');
    } else if (phase === 'FIXATION') {
        drawText('+', canvas.width/2, canvas.height/2, 60, '#ffcc00');
        drawText(`选择阶段 ${currentTrial+1}/${NUM_TRIALS}`, canvas.width/2, 25, 14, '#666');
    } else if (phase === 'DECISION') {
        const t = trials[currentTrial];
        const imgW = canvas.width * 0.35;
        const imgH = canvas.height * 0.7;
        const yOff = canvas.height * 0.15;
        if (foodImages[t.left] && foodImages[t.left].complete) {
            ctx.drawImage(foodImages[t.left], canvas.width*0.05, yOff, imgW, imgH);
        }
        if (foodImages[t.right] && foodImages[t.right].complete) {
            ctx.drawImage(foodImages[t.right], canvas.width*0.6, yOff, imgW, imgH);
        }
        ctx.fillStyle = '#2a6bff';
        ctx.fillRect(canvas.width*0.075, canvas.height*0.88, canvas.width*0.35, 40);
        drawText('⬅ 选左边', canvas.width*0.25, canvas.height*0.88+22, 16, '#fff');
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(canvas.width*0.575, canvas.height*0.88, canvas.width*0.35, 40);
        drawText('➡ 选右边', canvas.width*0.75, canvas.height*0.88+22, 16, '#fff');
        drawText(`选择阶段 ${currentTrial+1}/${NUM_TRIALS}`, canvas.width/2, 25, 14, '#666');
    } else if (phase === 'DONE') {
        drawText('✅ 实验完成！感谢参与', canvas.width/2, canvas.height/2 - 30, 26);
        drawText('点击屏幕下载数据', canvas.width/2, canvas.height/2 + 30, 18, '#ffcc00');
    }

    // 画注视点 (始终画)
    if (frameCount > 0 && lastGaze.valid && rawXBuffer.length >= 3) {
        // 用中位数(而非均值)来平滑, 天然抗器堋值且不阻挡扫视
        const medX = median(rawXBuffer.slice(-5));
        const medY = median(rawYBuffer.slice(-5));
        const gx = mapX(medX);
        const gy = mapY(medY);

        // EMA 平滑显示位置
        if (displayGX === 0 && displayGY === 0) {
            displayGX = gx; displayGY = gy;
        } else {
            displayGX = displayGX + EMA_ALPHA * (gx - displayGX);
            displayGY = displayGY + EMA_ALPHA * (gy - displayGY);
        }

        ctx.beginPath();
        ctx.arc(displayGX, displayGY, 12, 0, Math.PI*2);
        ctx.fillStyle = calibrated ? 'rgba(0,255,100,0.7)' : 'rgba(255,200,0,0.7)';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 记录 (评分 + 二元选择阶段都记录)
        if (phase === 'DECISION' || phase === 'RATING_DECISION') {
            const isRating = phase === 'RATING_DECISION';
            gazeLog.push({
                phase: isRating ? 'rating' : 'choice',
                trial: isRating ? currentRatingIndex : currentTrial,
                time: Date.now() - (isRating ? ratingStartTime : trialStartTime),
                gazeX: (gx / canvas.width).toFixed(4),
                gazeY: (gy / canvas.height).toFixed(4),
                raw_x: lastGaze.raw_x.toFixed(5),
                raw_y: lastGaze.raw_y.toFixed(5)
            });
        }
    }

    requestAnimationFrame(draw);
}

function drawText(text, x, y, size, color) {
    ctx.fillStyle = color || '#fff';
    ctx.font = `${size||16}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
}

// ============================================================
// 校准
// ============================================================
let calibPoints = [
    {x:0.5, y:0.5}, {x:0.15, y:0.5}, {x:0.85, y:0.5}, {x:0.5, y:0.2}, {x:0.5, y:0.8}
];
let calibIndex = 0;
let calibResX = [], calibResY = [];

async function calibrate() {
    phase = 'CALIBRATING';
    calibResX = []; calibResY = [];
    
    for (let i = 0; i < calibPoints.length; i++) {
        const cp = calibPoints[i];
        calibCurrentPoint = { x: cp.x, y: cp.y, index: i+1, total: calibPoints.length };
        
        // 等被试注视到校准点位置
        await sleep(1000);
        
        // 采集有效帧：至少5帧，最多等3秒
        const samplesX = [], samplesY = [];
        const deadline = Date.now() + 3000;
        while (samplesX.length < 5 && Date.now() < deadline) {
            await sleep(50);
            if (lastGaze.valid) {
                samplesX.push(lastGaze.raw_x);
                samplesY.push(lastGaze.raw_y);
            }
        }
        
        const cx = samplesX.length >= 3 ? median(samplesX) : lastGaze.raw_x;
        const cy = samplesY.length >= 3 ? median(samplesY) : lastGaze.raw_y;
        calibResX.push(cx);
        calibResY.push(cy);
    }
    calibCurrentPoint = null;

    calibLimits.x_center = calibResX[0];
    calibLimits.x_min = Math.min(...calibResX) - (calibResX[0] - Math.min(...calibResX)) * 0.6;
    calibLimits.x_max = Math.max(...calibResX) + (Math.max(...calibResX) - calibResX[0]) * 0.6;
    calibLimits.y_center = calibResY[0];
    calibLimits.y_min = Math.min(...calibResY) - (calibResY[0] - Math.min(...calibResY)) * 0.6;
    calibLimits.y_max = Math.max(...calibResY) + (Math.max(...calibResY) - calibResY[0]) * 0.6;
    
    calibrated = true;
}

// ============================================================
// 评分按钮坐标 (横屏: 2行×5列, 在图片右侧)
// ============================================================
function getRatingBtnCoords() {
    const btnW = Math.min(canvas.width * 0.08, 70);
    const btnH = Math.min(canvas.height * 0.18, 55);
    const gap = 8;
    const cols = 5;
    const totalW = cols * btnW + (cols-1) * gap;
    const startX = canvas.width * 0.42;
    const startY = (canvas.height - (2 * btnH + gap)) / 2;
    const btns = [];
    for (let i = 0; i < 10; i++) {
        const r = Math.floor(i / cols);
        const c = i % cols;
        btns.push({
            x: startX + c * (btnW + gap),
            y: startY + r * (btnH + gap),
            w: btnW, h: btnH,
            val: i + 1
        });
    }
    return btns;
}

// ============================================================
// 主实验流程
// ============================================================
async function runExperiment() {
    // 阶段一: 评分 (200张)
    await runRatings();

    // 过渡页
    phase = 'PHASE1_END';
    await waitClick();

    // 根据评分生成二元选择配对
    generateCombinations();

    // 重新校准
    await calibrate();

    // 阶段二: 二元选择 (150试次, 每50休息+校准)
    await runTrials();

    phase = 'DONE';
}

// ============================================================
// 阶段一: 评分
// ============================================================
async function runRatings() {
    for (currentRatingIndex = 0; currentRatingIndex < RATING_COUNT; currentRatingIndex++) {
        phase = 'RATING_FIXATION';
        await sleep(500 + Math.random() * 300);
        phase = 'RATING_DECISION';
        ratingStartTime = Date.now();
        const rating = await waitRating();
        const rt = Date.now() - ratingStartTime;
        ratingLog.push({
            image: ratingImages[currentRatingIndex],
            rating: rating,
            rt: rt
        });
    }
}

function waitRating() {
    return new Promise(resolve => {
        function handler(e) {
            const rect = canvas.getBoundingClientRect();
            const tx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const ty = (e.clientY - rect.top) * (canvas.height / rect.height);
            const btns = getRatingBtnCoords();
            for (let btn of btns) {
                if (tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h) {
                    canvas.removeEventListener('click', handler);
                    resolve(btn.val);
                    return;
                }
            }
        }
        canvas.addEventListener('click', handler);
    });
}

// ============================================================
// 基于评分生成二元选择配对 (复刻 food2 逻辑)
// ============================================================
function generateCombinations() {
    const ratingGroups = {};
    for (let item of ratingLog) {
        if (!ratingGroups[item.rating]) ratingGroups[item.rating] = [];
        ratingGroups[item.rating].push(item.image);
    }
    const uniqueRatings = Object.keys(ratingGroups).map(Number);
    if (uniqueRatings.length < 2) {
        alert('评分全部相同，无法生成对比配对，将随机配对。');
        for (let k = 0; k < NUM_TRIALS; k++) {
            const a = Math.floor(Math.random() * imgList.length);
            let b = Math.floor(Math.random() * (imgList.length - 1));
            if (b >= a) b++;
            trials.push({ left: imgList[a], right: imgList[b], left_rating: 0, right_rating: 0 });
        }
        return;
    }
    // 生成所有不同评分的两两排列
    const perms = [];
    for (let i = 0; i < uniqueRatings.length; i++) {
        for (let j = 0; j < uniqueRatings.length; j++) {
            if (i !== j) perms.push([uniqueRatings[i], uniqueRatings[j]]);
        }
    }
    perms.sort(() => Math.random() - 0.5);
    trials = [];
    for (let k = 0; k < NUM_TRIALS; k++) {
        const p = perms[Math.floor(Math.random() * perms.length)];
        const leftImages = ratingGroups[p[0]];
        const rightImages = ratingGroups[p[1]];
        trials.push({
            left: leftImages[Math.floor(Math.random() * leftImages.length)],
            right: rightImages[Math.floor(Math.random() * rightImages.length)],
            left_rating: p[0],
            right_rating: p[1]
        });
    }
}

// ============================================================
// 阶段二: 二元选择
// ============================================================
async function runTrials() {
    for (currentTrial = 0; currentTrial < NUM_TRIALS; currentTrial++) {
        if (currentTrial > 0 && currentTrial % 50 === 0) {
            phase = 'BREAK';
            await waitBreak();
            await calibrate();
        }
        phase = 'FIXATION';
        await sleep(800);
        phase = 'DECISION';
        trialStartTime = Date.now();
        const choice = await waitChoice();
        trials[currentTrial].choice = choice;
        trials[currentTrial].rt = Date.now() - trialStartTime;
    }
}

function waitBreak() {
    return new Promise(resolve => { breakResolve = resolve; });
}

function waitClick() {
    return new Promise(resolve => {
        function handler() { canvas.removeEventListener('click', handler); resolve(); }
        canvas.addEventListener('click', handler);
    });
}

function waitChoice() {
    return new Promise(resolve => {
        function handler(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            if (x < 0.5) { canvas.removeEventListener('click', handler); resolve('left'); }
            else { canvas.removeEventListener('click', handler); resolve('right'); }
        }
        canvas.addEventListener('click', handler);
    });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
// 触摸/点击事件 (启动 + 休息)
// ============================================================
canvas.addEventListener('click', () => {
    if (phase === 'READY') {
        calibrate().then(() => runExperiment());
    } else if (phase === 'BREAK' && breakResolve) {
        breakResolve();
        breakResolve = null;
    } else if (phase === 'DONE') {
        downloadData();
    }
});

// ============================================================
// 数据下载
// ============================================================
function downloadData() {
    // 1. 注视数据
    const gazeCsv = 'phase,trial,time_ms,gazeX,gazeY,raw_x,raw_y\n' +
        gazeLog.map(g => `${g.phase},${g.trial},${g.time},${g.gazeX},${g.gazeY},${g.raw_x},${g.raw_y}`).join('\n');
    downloadFile(gazeCsv, `landscape_gaze_${Date.now()}.csv`);

    // 2. 评分数据
    const ratingCsv = 'image,rating,rt_ms\n' +
        ratingLog.map(r => `${r.image},${r.rating},${r.rt}`).join('\n');
    downloadFile(ratingCsv, `landscape_rating_${Date.now()}.csv`);

    // 3. 行为数据
    const behavCsv = 'trial,left_img,right_img,left_rating,right_rating,choice,rt_ms\n' +
        trials.map((t,i) => `${i+1},${t.left},${t.right},${t.left_rating||''},${t.right_rating||''},${t.choice||''},${t.rt?t.rt.toFixed(0):''}`).join('\n');
    downloadFile(behavCsv, `landscape_behavior_${Date.now()}.csv`);
}

function downloadFile(content, filename) {
    const blob = new Blob([content], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

// ============================================================
// 初始化 (与 food3_formal 完全一致)
// ============================================================
async function init() {
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });
    await camera.start();

    phase = 'READY';
}

draw();
init();
</script>
